<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naukri Filter</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .table-container {
            max-height: calc(100vh - 220px);
        }

        td {
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 450px;
            vertical-align: top;
        }

        .scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: #18181b;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 999px;
        }

        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        .filter-dropdown {
            max-height: 240px;
            overflow-y: auto;
        }

        .fade-in {
            animation: fadeIn 0.2s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-zinc-950 text-zinc-100 overflow-hidden">

<div class="flex h-screen">

    <!-- SIDEBAR -->
    <div class="w-[360px] border-r border-zinc-800 bg-zinc-900 flex flex-col">

        <!-- HEADER -->
        <div class="p-6 border-b border-zinc-800 bg-zinc-900 sticky top-0 z-10">

            <div class="flex items-center gap-3 mb-5">
                <div class="w-12 h-12 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-950 font-bold text-2xl shadow-lg">
                    📍
                </div>

                <div>
                    <h1 class="text-2xl font-bold tracking-tight">
                        Naukri Filter
                    </h1>

                    <p class="text-sm text-zinc-400">
                        Smart candidate filtering dashboard
                    </p>
                </div>
            </div>

            <!-- UPLOAD -->
            <div id="upload-zone"
                 class="border-2 border-dashed border-zinc-700 hover:border-yellow-400 rounded-3xl p-6 text-center transition-all bg-zinc-950/50 hover:bg-zinc-900 cursor-pointer">

                <i class="fa-solid fa-cloud-arrow-up text-4xl mb-3 text-zinc-400"></i>

                <p class="font-medium text-sm mb-3">
                    Upload CSV or XLSX
                </p>

                <input
                        type="file"
                        id="file-input"
                        accept=".csv,.xlsx"
                        class="hidden"
                        onchange="handleUpload(event)">

                <button
                        onclick="document.getElementById('file-input').click()"
                        class="px-5 py-2.5 bg-yellow-400 hover:bg-yellow-300 text-zinc-950 rounded-2xl text-sm font-semibold transition-all">
                    Browse File
                </button>
            </div>
        </div>

        <!-- FILTERS -->
        <div class="flex-1 overflow-y-auto scrollbar p-5">

            <div class="flex items-center justify-between mb-4">
                <h2 class="font-semibold text-lg">
                    Filters
                </h2>

                <button
                        onclick="clearAllFilters()"
                        class="text-xs px-3 py-1.5 rounded-xl bg-zinc-800 hover:bg-zinc-700 transition-all text-zinc-300">
                    Clear All
                </button>
            </div>

            <div id="dynamic-filters" class="space-y-5"></div>
        </div>

        <!-- COUNTS -->
        <div class="p-5 border-t border-zinc-800 bg-zinc-900">

            <div class="grid grid-cols-2 gap-3">

                <div class="bg-zinc-800 rounded-2xl p-4">
                    <p class="text-xs text-zinc-400 uppercase mb-1">
                        Total
                    </p>

                    <h3 id="total-count" class="text-2xl font-bold">
                        0
                    </h3>
                </div>

                <div class="bg-yellow-400 rounded-2xl p-4 text-zinc-950">
                    <p class="text-xs uppercase mb-1 font-medium">
                        Filtered
                    </p>

                    <h3 id="filtered-count" class="text-2xl font-bold">
                        0
                    </h3>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- TOP BAR -->
        <div class="p-6 border-b border-zinc-800 bg-zinc-900 flex items-center justify-between">

            <div>
                <h1 class="text-3xl font-bold tracking-tight">
                    Filtered Candidates
                </h1>

                <p class="text-sm text-zinc-400 mt-1">
                    Search and filter candidates instantly
                </p>
            </div>

            <button
                    onclick="exportData()"
                    class="bg-yellow-400 hover:bg-yellow-300 text-zinc-950 px-6 py-3 rounded-2xl font-semibold flex items-center gap-3 transition-all shadow-lg shadow-yellow-500/10">

                <i class="fa-solid fa-download"></i>
                Export XLSX
            </button>
        </div>

        <!-- TABLE -->
        <div class="flex-1 overflow-auto scrollbar p-6 bg-zinc-950">

            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl">

                <div class="overflow-auto table-container scrollbar">

                    <table class="w-max min-w-full">

                        <thead class="sticky top-0 bg-zinc-900 z-10 border-b border-zinc-700">
                        <tr id="table-header"></tr>
                        </thead>

                        <tbody id="table-body"
                               class="divide-y divide-zinc-800"></tbody>

                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

    let sessionId = null;

    let allColumns = [];

    let currentFilters = {};

    let textSearches = {};

    let allDataPreview = [];

    let filterValues = {};

    let DISPLAY_COLUMNS = [];

    const FILTER_COLUMNS = [
        "Industry",
        "Role",
        "Department",
        "Under Graduation degree",
        "Post graduation degree"
    ];

    function showToast(msg) {

        const toast = document.createElement('div');

        toast.className = `
            fixed bottom-6 right-6 z-50
            bg-zinc-900 border border-yellow-400
            text-yellow-300 px-5 py-3 rounded-2xl
            shadow-2xl fade-in
        `;

        toast.textContent = msg;

        document.body.appendChild(toast);

        setTimeout(() => {
            toast.remove();
        }, 2500);
    }

    async function handleUpload(e) {

        const file = e.target.files[0];

        if (!file) return;

        const formData = new FormData();

        formData.append('file', file);

        try {

            showToast('Uploading and processing file...');

            const res = await fetch(
                'http://localhost:5000/upload',
                {
                    method: 'POST',
                    body: formData
                }
            );

            const result = await res.json();

            if (result.error) {
                throw new Error(result.error);
            }

            sessionId = result.session_id;

            allColumns = result.columns;

            DISPLAY_COLUMNS = result.columns;

            allDataPreview = result.preview || [];

            filterValues = result.filter_options || {};

            document.getElementById('total-count').textContent =
                result.total_rows.toLocaleString();

            document.getElementById('filtered-count').textContent =
                result.total_rows.toLocaleString();

            renderFilters();

            renderTableHeader();

            renderTable(allDataPreview);

            showToast(`Loaded ${result.total_rows} candidates`);

        } catch (err) {

            showToast(err.message || 'Upload failed');
        }
    }

    function renderFilters() {

        const container = document.getElementById('dynamic-filters');

        container.innerHTML = '';

        FILTER_COLUMNS.forEach(col => {

            if (!allColumns.includes(col)) return;

            const values = filterValues[col] || [];

            const wrapper = document.createElement('div');

            wrapper.className = `
                bg-zinc-900 border border-zinc-800
                rounded-3xl p-4 shadow-lg
            `;

            wrapper.innerHTML = `

                <div class="flex items-center justify-between mb-3">
                    <h3 class="font-semibold text-sm tracking-wide">
                        ${col}
                    </h3>

                    <span class="text-xs text-zinc-500">
                        ${values.length} options
                    </span>
                </div>

                <input
                    type="text"
                    placeholder="Search in ${col}..."
                    class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm mb-3 focus:border-yellow-400 outline-none transition-all"
                    data-col="${col}"
                >

                <div class="bg-zinc-950 border border-zinc-800 rounded-2xl p-3">

                    <input
                        type="text"
                        placeholder="Search dropdown options..."
                        class="dropdown-search w-full bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-2 text-sm mb-3 outline-none focus:border-yellow-400"
                        data-col="${col}"
                    >

                    <div class="filter-dropdown scrollbar space-y-2" id="dropdown-${col.replace(/\s+/g, '-')}">

                        ${values.map(val => `

                            <label class="flex items-start gap-3 p-2 rounded-xl hover:bg-zinc-800 cursor-pointer transition-all group">

                                <input
                                    type="checkbox"
                                    value="${String(val).replace(/"/g, '&quot;')}"
                                    data-col="${col}"
                                    class="filter-checkbox mt-1 accent-yellow-400 w-4 h-4"
                                >

                                <span class="text-sm text-zinc-300 group-hover:text-white break-words leading-relaxed">
                                    ${val}
                                </span>

                            </label>

                        `).join('')}

                    </div>
                </div>
            `;

            container.appendChild(wrapper);
        });

        setupEvents();
    }

    function setupEvents() {

        // TEXT SEARCH
        document.querySelectorAll('input[data-col]:not(.filter-checkbox):not(.dropdown-search)')
            .forEach(input => {

                input.addEventListener('input', () => {

                    const col = input.dataset.col;

                    textSearches[col] = input.value;

                    applyFilters();
                });
            });

        // CHECKBOX FILTERS
        document.querySelectorAll('.filter-checkbox')
            .forEach(checkbox => {

                checkbox.addEventListener('change', () => {

                    const col = checkbox.dataset.col;

                    const checked = Array.from(
                        document.querySelectorAll(`.filter-checkbox[data-col="${col}"]:checked`)
                    ).map(cb => cb.value);

                    currentFilters[col] = checked;

                    applyFilters();
                });
            });

        // DROPDOWN SEARCH
        document.querySelectorAll('.dropdown-search')
            .forEach(searchInput => {

                searchInput.addEventListener('input', () => {

                    const col = searchInput.dataset.col;

                    const value = searchInput.value.toLowerCase();

                    const dropdown = document.getElementById(
                        `dropdown-${col.replace(/\s+/g, '-')}`
                    );

                    dropdown.querySelectorAll('label')
                        .forEach(label => {

                            const text = label.innerText.toLowerCase();

                            label.style.display =
                                text.includes(value)
                                    ? 'flex'
                                    : 'none';
                        });
                });
            });
    }

    function clearAllFilters() {

        currentFilters = {};

        textSearches = {};

        document.querySelectorAll('input')
            .forEach(input => {

                if (input.type === 'checkbox') {
                    input.checked = false;
                }

                else {
                    input.value = '';
                }
            });

        applyFilters();
    }

    function renderTableHeader() {

        const header = document.getElementById('table-header');

        header.innerHTML = '';

        DISPLAY_COLUMNS.forEach(col => {

            const th = document.createElement('th');

            th.className = `
                px-6 py-4
                text-left text-xs uppercase
                tracking-wider font-semibold
                text-zinc-400
                whitespace-nowrap
                bg-zinc-900
                border-b border-zinc-800
                sticky top-0 z-20
            `;

            th.textContent = col;

            header.appendChild(th);
        });
    }

    function renderTable(data) {

        const tbody = document.getElementById('table-body');

        tbody.innerHTML = '';

        data.forEach((row) => {

            const tr = document.createElement('tr');

            tr.className = `
                hover:bg-zinc-800/70
                transition-all duration-150
                border-b border-zinc-800
            `;

            let html = '';

            DISPLAY_COLUMNS.forEach(col => {

                let val =
                    row[col] !== null &&
                    row[col] !== undefined
                        ? row[col]
                        : '';

                if (Array.isArray(val)) {
                    val = val.join(', ');
                }

                if (typeof val === 'object' && val !== null) {
                    val = JSON.stringify(val);
                }

                html += `
                    <td class="
                        px-6 py-4
                        text-sm text-zinc-300
                        leading-relaxed
                        min-w-[220px]
                        max-w-[450px]
                        break-words
                        align-top
                    ">
                        ${val}
                    </td>
                `;
            });

            tr.innerHTML = html;

            tbody.appendChild(tr);
        });
    }

    async function applyFilters() {

        if (!sessionId) return;

        try {

            const res = await fetch(
                'http://localhost:5000/filter',
                {
                    method: 'POST',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({
                        session_id: sessionId,
                        filters: currentFilters,
                        text_searches: textSearches
                    })
                }
            );

            const result = await res.json();

            if (result.error) {
                throw new Error(result.error);
            }

            document.getElementById('filtered-count').textContent =
                result.total.toLocaleString();

            renderTable(result.data || []);

        } catch (err) {

            showToast('Filter failed');
        }
    }

    async function exportData() {

        if (!sessionId) {
            return showToast('No data to export');
        }

        try {

            const res = await fetch(
                'http://localhost:5000/export',
                {
                    method: 'POST',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({
                        session_id: sessionId,
                        filters: currentFilters,
                        text_searches: textSearches
                    })
                }
            );

            if (res.ok) {

                const blob = await res.blob();

                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');

                a.href = url;

                a.download = 'Filtered_Candidates.xlsx';

                a.click();

                showToast('Export successful');
            }

        } catch (err) {

            showToast('Export failed');
        }
    }

</script>

</body>
</html>
